{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Applicant Tracking System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{% static 'css/theme.css' %}?v=2" rel="stylesheet">
<style>
  body { background: linear-gradient(160deg, #f0f7f7 0%, #f8f9fa 60%); min-height: 100vh;
         display: grid; place-items: center; }
  .login-wrap { width: 100%; max-width: 400px; padding: 1rem; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="text-center mb-4">
    <h3 style="color: var(--dark-green); font-weight: 700;">Applicant Tracking System</h3>
  </div>
  <div class="card app-card p-4">
    <h5 class="mb-3 text-center">HR Sign in</h5>
    {% if form.errors %}
      <div class="alert alert-danger">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn btn-primary-app w-100">Login</button>
    </form>
    <div class="text-center mt-3"><a href="{% url 'landing' %}" class="small text-muted">&larr; Back to home</a></div>
  </div>
</div>
</body>
</html>
