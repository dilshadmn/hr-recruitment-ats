{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applicant Tracking System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="{% static 'css/theme.css' %}?v=2" rel="stylesheet">
<style>
  body { background: linear-gradient(160deg, #f0f7f7 0%, #f8f9fa 60%); min-height: 100vh; }
  .landing-wrap { max-width: 960px; margin: 0 auto; padding: 4rem 1rem; }
  .login-card {
    display: block; text-decoration: none; color: inherit;
    background: #fff; border: 1px solid var(--border-color); border-radius: 14px;
    padding: 2rem 1.25rem; text-align: center; height: 100%;
    transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease;
  }
  .login-card:hover {
    box-shadow: 0 10px 26px rgba(0,140,140,0.16); transform: translateY(-4px);
    border-color: var(--primary-green); color: inherit;
  }
  .login-card .bi { font-size: 2.4rem; color: var(--primary-green); }
  .login-card h5 { margin: .8rem 0 .3rem; font-weight: 600; }
  .login-card p { color: #7a8686; font-size: .85rem; margin: 0; }
</style>
</head>
<body>
<div class="landing-wrap">
  <div class="text-center mb-5">
    <h1 style="color: var(--dark-green); font-weight: 700;">Applicant Tracking System</h1>
    <p class="text-muted">Choose how you'd like to sign in</p>
  </div>
  <div class="row g-4 justify-content-center">
    <div class="col-md-4">
      <a href="{% url 'vacancy_list' %}" class="login-card">
        <i class="bi bi-person-badge"></i>
        <h5>Candidate Login</h5>
        <p>Browse open positions and apply for jobs.</p>
      </a>
    </div>
    <div class="col-md-4">
      <a href="{% url 'login' %}?next={% url 'hr_dashboard' %}" class="login-card">
        <i class="bi bi-people"></i>
        <h5>HR Login</h5>
        <p>Manage candidates, interviews and the pipeline.</p>
      </a>
    </div>
    <div class="col-md-4">
      <a href="/admin/" class="login-card">
        <i class="bi bi-gear-wide-connected"></i>
        <h5>Admin Login</h5>
        <p>System administration and configuration.</p>
      </a>
    </div>
  </div>
</div>
</body>
</html>
