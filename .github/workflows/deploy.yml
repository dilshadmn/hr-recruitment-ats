name: Build and deploy ATS to Azure

# Every push to main rebuilds the container image and updates the web app.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

env:
  REGISTRY: turnbhrmsacr.azurecr.io
  IMAGE: ats
  WEBAPP: turnb-hrms-ats

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      - name: Deploy image to the web app
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
